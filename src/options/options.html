<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>

<form>
    <fieldset>
        <legend>Zero Width Detection</legend>

        <input type="radio" id="dynamic0" name="scanrate">
        <label for="dynamic0">Scan Static & Dynamic webpages every 1sec(requires extra permissions)</label><br/>

        <input type="radio" id="off0" name="scanrate">
        <label for="off0">Do not scan anything</label><br/>

        <input type="radio" id="static0" name="scanrate">
        <label for="static0">Scan Static webpages once when loaded(requires extra permissions)</label>
    </fieldset>
    <button type="submit">Save</button>
</form>

<script src="options.js"></script>

</body>
</html>
